# hugr-docs-2 — the docs-retrieval subagent, defined as data.
#
# This file IS the agent (together with SYSTEM.md next to it). There is no
# Rust code in this folder: the toolkit interprets this manifest (`hugr run`)
# or bundles it into artifacts (`hugr build`). Reviewing this file is
# reviewing the agent's entire blast radius: a tool that is not granted here
# is not registered, and an unregistered capability cannot be invoked
# (ARCHITECTURE §20.1 — sandbox-by-registration).
#
# Status: illustrative example of the target authoring format (ROADMAP T1).
# The toolkit that interprets it does not exist yet.

[agent]
name = "hugr-docs"
version = "2.0.0"
description = "Answers a question from a local documentation folder. Read-only: it can list, search, and read files under the configured docs root, and nothing else."

# ---------------------------------------------------------------------------
# Models. Tiers are the logical selectors the brain routes between (small/
# medium/big, ARCHITECTURE §5.3). This agent is simple enough to run all
# phases on one tier, so only `medium` is configured; compaction and any
# future judge fall back to it. Pricing is mandatory per configured tier —
# it is what makes AnswerMeta.cost_micro_usd computable from the trace alone.
# ---------------------------------------------------------------------------

[models]
base_url = "https://router.huggingface.co/v1"     # any OpenAI-compatible endpoint
api_key_env = "HUGR_DOCS_API_KEY"                  # never inlined; env-resolved, redacted in --config

[models.medium]
model = "google/gemma-4-31B-it:cerebras"           # must support tool calling
temperature = 0.0
input_usd_per_m_tokens = 1.0
output_usd_per_m_tokens = 1.5

# ---------------------------------------------------------------------------
# Tool grants. Each `[tools.<name>]` picks a tool from the predefined library
# (ARCHITECTURE §20.2) and scopes it. Privilege classes are declared by the
# library; this agent grants read-only tools exclusively, so the packaged
# binary contains no shell, no write path, and no network client beyond the
# model endpoint.
# ---------------------------------------------------------------------------

[tools.fs_read]
# The generalized hugr-docs toolset: list / search / read / read_range /
# read_many / read_range_many / outline. Privilege class: read-only.
# Every path is canonicalized and jailed to `root`; escapes are rejected.
root = "${docs_path}"          # bound at ask time: CLI positional arg,
                               # Python `docs_path=`, or HUGR_DOCS_PATH.
index_files = ["AI_INDEX.md"]  # navigation aids: usable during search, but
                               # filtered from cited documents and counted
                               # separately in the answer metadata.

[tools.scratchpad]
# Private jailed workspace for notes between turns of a resumed/forked
# conversation (ARCHITECTURE §19.3). Ungated (it can only touch itself).
# Privilege class: read-write, self-scoped.

# Deliberately NOT granted (and therefore not present in the artifact):
#   [tools.shell]        [tools.fs_write]        [tools.http_fetch]

# ---------------------------------------------------------------------------
# Hard limits, enforced host-side (ROADMAP T3.1). Exceeding one ends the run
# with `status = "error"` and a typed reason; the partial trace still
# persists and verifies.
# ---------------------------------------------------------------------------

[limits]
max_model_calls = 16
max_cost_micro_usd = 50_000    # 5 cents
timeout_s = 120

# ---------------------------------------------------------------------------
# Traces. Every ask persists an immutable trace; passing its id back resumes,
# passing an older id forks (ARCHITECTURE §19.2). `depends_on` lineage is
# recorded in trace headers automatically.
# ---------------------------------------------------------------------------

[traces]
store = "~/.local/share/hugr-docs/traces"   # default; overridable per surface

# ---------------------------------------------------------------------------
# Structured extras (ROADMAP T3.4). The Answer contract is fixed (status,
# message, trace_id, metadata); agent-specific structure rides Answer.extra,
# validated post-hoc against this schema, never load-bearing.
# ---------------------------------------------------------------------------

[answer.extra_schema]
related_documents = { type = "array", items = "string", description = "Docs-root-relative paths of non-index documents the answer is based on." }
