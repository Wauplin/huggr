name: Publish huglet-docs to PyPI

# Manual release of the huglet-docs typed Python wheel, published with PyPI
# trusted publishing (OIDC, no API token). Register this workflow as the
# project's trusted publisher on PyPI with environment `pypi`.
#
# The native extension is abi3-py39, so a single build produces one wheel that
# covers all Python >=3.9. Built on ubuntu-22.04 (glibc 2.35) so the wheel tags
# manylinux_2_35; ubuntu-latest would tag manylinux_2_39, too new for most
# systems.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install maturin
        run: pip install maturin
      - name: Build wheel
        run: cargo run -p huggr-toolkit --bin huggr -- build examples/huglet-docs --surface python --release
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: examples/huglet-docs/dist/huglet-docs-python/target/wheels/*.whl
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
